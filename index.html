<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permanentfrost | The Archive</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        darkBg: '#09090E',
                        violetAccent: '#8B5CF6',
                        violetDark: '#4F46E5',
                        cardBg: 'rgba(25, 25, 35, 0.6)'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #09090E; }
        .glass-card {
            background: rgba(25, 25, 35, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(139, 92, 246, 0.15);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(139, 92, 246, 0.6);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px -10px rgba(139, 92, 246, 0.25);
        }
        .bg-glow {
            position: fixed; top: -10%; left: 50%; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, rgba(9,9,14,0) 70%);
            transform: translateX(-50%); z-index: -1; pointer-events: none;
        }
        
        #modal-content::-webkit-scrollbar { width: 8px; }
        #modal-content::-webkit-scrollbar-track { background: transparent; }
        #modal-content::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 4px; }
        #modal-content::-webkit-scrollbar-thumb:hover { background: rgba(139, 92, 246, 0.6); }
    </style>
</head>
<body class="text-gray-300 font-sans min-h-screen relative overflow-x-hidden pb-20">
    <div class="bg-glow"></div>
    
    <div class="max-w-6xl mx-auto px-6 pt-16">
        
        <div id="profile-section" class="flex flex-col md:flex-row items-center md:items-start gap-6 mb-12 hidden animate-fade-in">
            <img id="profile-avatar" src="" alt="Profile" class="w-24 h-24 rounded-full border-2 border-violet-500/50 shadow-[0_0_20px_rgba(139,92,246,0.2)] object-cover">
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-semibold tracking-tight mb-2">
                    <span class="text-white">Permanentfrost</span> 
                    <span class="text-gray-600 mx-1">||</span> 
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-violetAccent to-violetDark">The Archive</span>
                </h1>
                <p id="profile-bio" class="text-gray-400 text-lg max-w-2xl leading-relaxed"></p>
                <div class="mt-4 flex items-center justify-center md:justify-start gap-4 text-sm text-gray-500 font-mono">
                    <span id="profile-followers" class="flex items-center gap-1"></span>
                    <a id="profile-link" href="#" target="_blank" class="hover:text-violetAccent transition-colors text-violet-400">@Permanentfrost</a>
                </div>
            </div>
        </div>

        <div class="mb-12 relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-gray-500 group-focus-within:text-violetAccent transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </div>
            <input type="text" id="search-input" placeholder="Search projects by name or keyword..." 
                   class="w-full bg-[#13131A]/80 backdrop-blur-md border border-gray-800 text-white px-12 py-4 rounded-xl focus:outline-none focus:border-violetAccent focus:ring-1 focus:ring-violetAccent transition-all shadow-lg placeholder-gray-600">
        </div>

        <div id="repo-container" class="space-y-16">
            <p id="loading-text" class="text-center text-violetAccent animate-pulse">Syncing systems with GitHub...</p>
        </div>
    </div>

    <div id="readme-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-md p-4 md:p-10 transition-opacity">
        <div class="relative w-full max-w-4xl max-h-full bg-[#13131A] border border-violet-500/30 rounded-2xl shadow-2xl overflow-hidden flex flex-col">
            <div class="flex justify-between items-center p-5 border-b border-white/10 bg-[#09090E]/90">
                <h3 id="modal-title" class="text-2xl font-bold text-white tracking-tight">Repository Name</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors p-2 text-xl font-bold rounded-full hover:bg-white/10">&times;</button>
            </div>
            <div id="modal-content" class="p-6 md:p-10 overflow-y-auto prose prose-invert prose-violet max-w-none text-gray-300 break-words">
                Loading...
            </div>
            <div class="p-4 border-t border-white/10 bg-[#09090E]/90 text-right flex justify-between items-center">
                <p class="text-xs text-gray-500">Rendered from GitHub README.md</p>
                <a id="modal-github-link" href="#" target="_blank" rel="noopener noreferrer" class="px-4 py-2 bg-violetDark hover:bg-violetAccent text-white text-sm font-semibold rounded-lg transition-colors shadow-lg shadow-violet-500/20">
                    View raw code on GitHub &rarr;
                </a>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_USERNAME = 'Permanentfrost';
        let allRepos = []; 

        const categories = {
            "Infrastructure & Homelab": ['ProxmoxTorrentVMSetup', 'proxmox-nextcloud', 'HTTPS_via_Caddy_forNextcloud_LANonly', 'omv-smb-private-public-setup', 'add-external-usb-backup-proxmox', 'HomeLab'],
            "Cybersecurity & Audit": ['az500studycram_checklist', 'ITAuditGuide', 'CyberSecFrameworks', 'sme-cysec-checklist', 'SwissDataprotectionGuide', 'htb_pt_guide'],
            "Hardware & Electronics": ['raspi-pico-cheatsheet', 'HardwareProjects'],
            "Gaming & Optimization": ['wotlk_wow', 'pc_performance']
        };

        // Custom Titles Dictionary
        const customTitles = {
            'ProxmoxTorrentVMSetup': 'Proxmox Torrent VM Setup',
            'proxmox-nextcloud': 'Proxmox Nextcloud',
            'HTTPS_via_Caddy_forNextcloud_LANonly': 'Local HTTPS via Caddy for Nextcloud',
            'az500studycram_checklist': 'AZ-500 Study Cram & Checklist',
            'htb_pt_guide': 'Hack The Box: Penetration Testing Guide',
            'omv-smb-private-public-setup': 'OMV SMB Private/Public Setup',
            'add-external-usb-backup-proxmox': 'Proxmox External USB Backup',
            'raspi-pico-cheatsheet': 'Raspberry Pi Pico Cheatsheet',
            'sme-cysec-checklist': 'SME Cybersecurity Checklist',
            'SwissDataprotectionGuide': 'Swiss Data Protection Guide',
            'ITAuditGuide': 'IT Audit Guide',
            'CyberSecFrameworks': 'Cyber Security Frameworks',
            'wotlk_wow': 'WotLK WoW Optimization',
            'pc_performance': 'PC Performance Tweaks'
        };

        function getCategory(repoName) {
            for (const [category, repos] of Object.entries(categories)) {
                if (repos.includes(repoName)) return category;
            }
            return "Other Projects"; 
        }

        async function fetchProfile() {
            try {
                const response = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}`);
                if (!response.ok) return;
                const user = await response.json();

                document.getElementById('profile-avatar').src = user.avatar_url;
                // Removed the line that overwrites your custom name with your GitHub profile name
                if (user.bio) document.getElementById('profile-bio').innerText = user.bio;
                document.getElementById('profile-link').href = user.html_url;
                
                document.getElementById('profile-section').classList.remove('hidden');
            } catch (e) { console.error("Could not load profile"); }
        }

        async function fetchRepos() {
            try {
                const response = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?per_page=100&sort=updated`);
                if (!response.ok) throw new Error('Failed to fetch');
                allRepos = await response.json();
                
                document.getElementById('loading-text').classList.add('hidden');
                renderRepos(allRepos);
            } catch (error) {
                document.getElementById('repo-container').innerHTML = `<p class="text-red-400">Error loading repositories. Please check the connection.</p>`;
            }
        }

        function renderRepos(repoList) {
            const container = document.getElementById('repo-container');
            container.innerHTML = '';

            const groupedRepos = {};
            repoList.forEach(repo => {
                const cat = getCategory(repo.name);
                if (!groupedRepos[cat]) groupedRepos[cat] = [];
                groupedRepos[cat].push(repo);
            });

            if (Object.keys(groupedRepos).length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 py-10">No projects found matching your search.</div>`;
                return;
            }

            const categoryOrder = [...Object.keys(categories), "Other Projects"];

            categoryOrder.forEach(category => {
                if (!groupedRepos[category] || groupedRepos[category].length === 0) return;

                const section = document.createElement('div');
                section.innerHTML = `
                    <h2 class="text-xl font-semibold text-white mb-6 border-b border-gray-800 pb-2">${category}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${groupedRepos[category].map(repo => {
                            const daysOld = (Date.now() - new Date(repo.updated_at).getTime()) / (1000 * 3600 * 24);
                            const isFresh = daysOld <= 30;
                            const freshDot = isFresh ? `<span class="relative flex h-2.5 w-2.5 mr-2" title="Recently Updated"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span></span>` : '';
                            
                            const langPill = repo.language ? `<span class="px-2.5 py-1 text-[10px] uppercase tracking-wider font-semibold rounded-full bg-violet-900/30 text-violet-300 border border-violet-500/20">${repo.language}</span>` : '';

                            // Dictionary Lookup applied here
                            const displayTitle = customTitles[repo.name] || repo.name;

                            return `
                            <div onclick="openReadme('${repo.name}', '${repo.html_url}')" class="glass-card rounded-xl p-6 flex flex-col h-full cursor-pointer group">
                                <div class="flex justify-between items-start mb-3">
                                    <h3 class="text-lg font-medium text-white group-hover:text-violetAccent transition-colors truncate pr-2">${displayTitle}</h3>
                                    ${langPill}
                                </div>
                                <p class="text-sm text-gray-400 mb-6 flex-grow leading-relaxed line-clamp-3">${repo.description || 'No description provided.'}</p>
                                <div class="flex items-center justify-between text-xs text-gray-500 font-mono mt-auto pt-4 border-t border-gray-800/50">
                                    <span class="flex items-center gap-1">
                                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"></path></svg>
                                        ${repo.stargazers_count}
                                    </span>
                                    <span class="flex items-center">
                                        ${freshDot}
                                        Upd: ${new Date(repo.updated_at).toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'})}
                                    </span>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredRepos = allRepos.filter(repo => {
                const nameMatch = repo.name.toLowerCase().includes(searchTerm);
                const descMatch = repo.description && repo.description.toLowerCase().includes(searchTerm);
                const langMatch = repo.language && repo.language.toLowerCase().includes(searchTerm);
                return nameMatch || descMatch || langMatch;
            });
            renderRepos(filteredRepos);
        });

        async function openReadme(repoName, repoUrl) {
            const modal = document.getElementById('readme-modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            const githubLink = document.getElementById('modal-github-link');

            // Apply custom titles to the modal popup as well!
            const displayTitle = customTitles[repoName] || repoName;
            title.innerText = displayTitle;
            
            githubLink.href = repoUrl;
            content.innerHTML = '<div class="flex justify-center py-10"><p class="animate-pulse text-violetAccent text-lg">Fetching README from GitHub...</p></div>';
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';

            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${repoName}/readme`, {
                    headers: { 'Accept': 'application/vnd.github.v3.raw' }
                });

                if (!response.ok) throw new Error(response.status === 404 ? 'No README.md found for this repository.' : 'Could not load repository data.');
                const markdownText = await response.text();
                content.innerHTML = marked.parse(markdownText);
            } catch (error) {
                content.innerHTML = `<div class="p-4 bg-red-900/20 border border-red-500/50 rounded-lg text-red-300 italic">${error.message}</div>`;
            }
        }

        function closeModal() {
            const modal = document.getElementById('readme-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('readme-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !document.getElementById('readme-modal').classList.contains('hidden')) closeModal();
        });

        Promise.all([fetchProfile(), fetchRepos()]);
    </script>
</body>
</html>
