<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permanentfrost | Systems & Security</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        darkBg: '#09090E',
                        violetAccent: '#8B5CF6',
                        violetDark: '#4F46E5',
                        cardBg: 'rgba(25, 25, 35, 0.6)'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #09090E; }
        .glass-card {
            background: rgba(25, 25, 35, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(139, 92, 246, 0.15);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(139, 92, 246, 0.6);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px -10px rgba(139, 92, 246, 0.25);
        }
        .bg-glow {
            position: fixed; top: -10%; left: 50%; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, rgba(9,9,14,0) 70%);
            transform: translateX(-50%); z-index: -1; pointer-events: none;
        }
        
        /* Modal Scrollbar Styling */
        #modal-content::-webkit-scrollbar { width: 8px; }
        #modal-content::-webkit-scrollbar-track { background: transparent; }
        #modal-content::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 4px; }
        #modal-content::-webkit-scrollbar-thumb:hover { background: rgba(139, 92, 246, 0.6); }
    </style>
</head>
<body class="text-gray-300 font-sans min-h-screen relative overflow-x-hidden pb-20">
    <div class="bg-glow"></div>
    <div class="max-w-6xl mx-auto px-6 pt-20">
        <header class="mb-16 text-center md:text-left">
            <h1 class="text-4xl md:text-5xl font-semibold text-white tracking-tight mb-4">
                Systems <span class="text-transparent bg-clip-text bg-gradient-to-r from-violetAccent to-violetDark">& Security</span>
            </h1>
            <p class="text-gray-400 text-lg max-w-2xl">
                A live feed of my latest infrastructure setups, cybersecurity frameworks, and hardware projects directly from GitHub.
            </p>
        </header>
        <div id="repo-container" class="space-y-16">
            <p class="text-center text-violetAccent animate-pulse">Syncing with GitHub...</p>
        </div>
    </div>

    <div id="readme-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-md p-4 md:p-10 transition-opacity">
        <div class="relative w-full max-w-4xl max-h-full bg-[#13131A] border border-violet-500/30 rounded-2xl shadow-2xl overflow-hidden flex flex-col transform transition-transform">
            
            <div class="flex justify-between items-center p-5 border-b border-white/10 bg-[#09090E]/90">
                <h3 id="modal-title" class="text-2xl font-bold text-white tracking-tight">Repository Name</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors p-2 text-xl font-bold rounded-full hover:bg-white/10">&times;</button>
            </div>
            
            <div id="modal-content" class="p-6 md:p-10 overflow-y-auto prose prose-invert prose-violet max-w-none text-gray-300 break-words">
                Loading...
            </div>
            
            <div class="p-4 border-t border-white/10 bg-[#09090E]/90 text-right flex justify-between items-center">
                <p class="text-xs text-gray-500">Rendered from GitHub README.md</p>
                <a id="modal-github-link" href="#" target="_blank" rel="noopener noreferrer" class="px-4 py-2 bg-violetDark hover:bg-violetAccent text-white text-sm font-semibold rounded-lg transition-colors shadow-lg shadow-violet-500/20">
                    View raw code on GitHub &rarr;
                </a>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_USERNAME = 'Permanentfrost';
        const categories = {
            "Infrastructure & Homelab": ['ProxmoxTorrentVMSetup', 'proxmox-nextcloud', 'HTTPS_via_Caddy_forNextcloud_LANonly', 'omv-smb-private-public-setup', 'add-external-usb-backup-proxmox', 'HomeLab'],
            "Cybersecurity & Audit": ['az500studycram_checklist', 'ITAuditGuide', 'CyberSecFrameworks', 'sme-cysec-checklist', 'SwissDataprotectionGuide', 'htb_pt_guide'],
            "Hardware & Electronics": ['raspi-pico-cheatsheet', 'HardwareProjects'],
            "Gaming & Optimization": ['wotlk_wow', 'pc_performance']
        };

        function getCategory(repoName) {
            for (const [category, repos] of Object.entries(categories)) {
                if (repos.includes(repoName)) return category;
            }
            return "Other Projects"; 
        }

        // --- NEW: Modal Functions --- //
        
        async function openReadme(repoName, repoUrl) {
            const modal = document.getElementById('readme-modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            const githubLink = document.getElementById('modal-github-link');

            // Setup modal state
            title.innerText = repoName;
            githubLink.href = repoUrl;
            content.innerHTML = '<div class="flex justify-center py-10"><p class="animate-pulse text-violetAccent text-lg">Fetching README from GitHub...</p></div>';
            
            // Show modal and prevent background scrolling
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';

            try {
                // Fetch the raw README file using GitHub's raw API
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${repoName}/readme`, {
                    headers: { 'Accept': 'application/vnd.github.v3.raw' }
                });

                if (!response.ok) {
                    if (response.status === 404) throw new Error('No README.md found for this repository.');
                    throw new Error('Could not load repository data.');
                }

                const markdownText = await response.text();
                // Convert Markdown to beautifully styled HTML
                content.innerHTML = marked.parse(markdownText);
            } catch (error) {
                content.innerHTML = `<div class="p-4 bg-red-900/20 border border-red-500/50 rounded-lg text-red-300 italic">${error.message}</div>`;
            }
        }

        function closeModal() {
            const modal = document.getElementById('readme-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto'; // Restore background scrolling
        }

        // Close modal when clicking on the dark background overlay
        document.getElementById('readme-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Close modal when pressing the Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !document.getElementById('readme-modal').classList.contains('hidden')) {
                closeModal();
            }
        });

        // --- Fetch & Render Logic --- //

        async function fetchRepos() {
            try {
                const response = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?per_page=100&sort=updated`);
                if (!response.ok) throw new Error('Failed to fetch');
                const repos = await response.json();

                const groupedRepos = {};
                repos.forEach(repo => {
                    const cat = getCategory(repo.name);
                    if (!groupedRepos[cat]) groupedRepos[cat] = [];
                    groupedRepos[cat].push(repo);
                });

                renderRepos(groupedRepos);
            } catch (error) {
                document.getElementById('repo-container').innerHTML = `<p class="text-red-400">Error loading repositories. Please check the connection.</p>`;
            }
        }

        function renderRepos(groupedRepos) {
            const container = document.getElementById('repo-container');
            container.innerHTML = '';

            Object.keys(categories).forEach(category => {
                if (!groupedRepos[category] || groupedRepos[category].length === 0) return;

                const section = document.createElement('div');
                section.innerHTML = `
                    <h2 class="text-2xl font-semibold text-white mb-6 border-b border-gray-800 pb-2">${category}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${groupedRepos[category].map(repo => `
                            <div onclick="openReadme('${repo.name}', '${repo.html_url}')" class="glass-card rounded-xl p-6 flex flex-col h-full cursor-pointer group">
                                <h3 class="text-xl font-medium text-white mb-3 group-hover:text-violetAccent transition-colors">${repo.name}</h3>
                                <p class="text-sm text-gray-400 mb-6 flex-grow leading-relaxed">${repo.description || 'No description provided.'}</p>
                                <div class="flex items-center justify-between text-xs text-gray-500 font-mono mt-auto">
                                    <span class="flex items-center gap-1">
                                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"></path></svg>
                                        ${repo.stargazers_count}
                                    </span>
                                    <span>Updated: ${new Date(repo.updated_at).toLocaleDateString('en-GB')}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
            
            if (groupedRepos["Other Projects"] && groupedRepos["Other Projects"].length > 0) {
                 const otherSection = document.createElement('div');
                 otherSection.innerHTML = `
                    <h2 class="text-2xl font-semibold text-white mb-6 border-b border-gray-800 pb-2 mt-12">Other Projects</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${groupedRepos["Other Projects"].map(repo => `
                            <div onclick="openReadme('${repo.name}', '${repo.html_url}')" class="glass-card rounded-xl p-6 flex flex-col h-full cursor-pointer group">
                                <h3 class="text-xl font-medium text-white mb-3 group-hover:text-violetAccent transition-colors">${repo.name}</h3>
                                <p class="text-sm text-gray-400 mb-6 flex-grow leading-relaxed">${repo.description || 'No description provided.'}</p>
                                <div class="flex items-center justify-between text-xs text-gray-500 font-mono mt-auto">
                                    <span>Updated: ${new Date(repo.updated_at).toLocaleDateString('en-GB')}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(otherSection);
            }
        }

        fetchRepos();
    </script>
</body>
</html>
